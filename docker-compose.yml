version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: boobleclone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: booble
      POSTGRES_PASSWORD: booble_secret
      POSTGRES_DB: boobleclone
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: